<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details - STONES COMPANY</title>
    <link rel="icon" href="img/logo.png">

    <!-- Icons and Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/cart.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>

<body>
    <!-- Header (Same as Index) -->
    <header id="header">
        <nav class="container">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="STONES COMPANY">
            </a>

            <div class="nav-actions">
                <a href="https://wa.me/+905301288498" target="_blank" class="whatsapp-nav"><i
                        class="fa-brands fa-whatsapp"></i></a>
            </div>
        </nav>
    </header>

    <main class="product-details-page">
        <div class="container">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="custom-breadcrumb" data-aos="fade-down">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                    <li class="breadcrumb-item"><a href="index.html#featured-products">Products</a></li>
                    <li class="breadcrumb-item active" id="breadcrumb-product-name" aria-current="page">Loading...</li>
                </ol>
            </nav>

            <div class="product-details-grid" id="productDetails">
                <!-- Skeleton Loader -->
                <div class="skeleton-loader"></div>
            </div>
        </div>
    </main>

    <!-- Footer Segment (Same as Index) -->
    <footer id="contact">
        <div class="container">
            <div class="footer-content">
                <p>Premium aluminum and PVC machinery provider. Quality you can trust.</p>
                <div class="footer-links">
                    <a href="https://wa.me/+905301288498" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 STONES COMPANY. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // AOS Init
        document.addEventListener('DOMContentLoaded', function () {
            AOS.init({
                duration: 800,
                once: true
            });
        });

        // Scroll effect for header
        window.addEventListener('scroll', function () {
            const header = document.getElementById('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>

</html>
